<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <style>
      .border { fill: none; stroke: #000; stroke-width: 2; }
      .line-thin { fill: none; stroke: #000; stroke-width: 0.5; }
      .line-med { fill: none; stroke: #000; stroke-width: 1; }
      .line-bold { fill: none; stroke: #000; stroke-width: 1.5; }
      .line-dash { fill: none; stroke: #000; stroke-width: 0.5; stroke-dasharray: 3,3; }
      .text-title { font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif; font-size: 18px; fill: #000; font-weight: bold; }
      .text-sub { font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif; font-size: 11px; fill: #000; }
      .text-en { font-family: 'Georgia', 'Times New Roman', serif; font-size: 10px; fill: #000; font-style: italic; }
      .dot { fill: #000; }
    </style>
  </defs>

  <!-- 边框 -->
