      * { margin: 0; padding: 0; box-sizing: border-box; }
      .bg { fill: #FAFAFA; }
      .border { fill: none; stroke: #E5E5E5; stroke-width: 1.5; }
      .border-subtle { fill: none; stroke: #E5E5E5; stroke-width: 0.5; }
      .surface { fill: #F0F0F0; }
      .text-primary { fill: #2D2D2D; }
      .text-muted { fill: #9CA3AF; }
      .text-accent { fill: #5B7B9A; }
      .text-white { fill: #FAFAFA; }
      .accent-fill { fill: #5B7B9A; }
      .accent-stroke { fill: none; stroke: #5B7B9A; stroke-width: 1.5; }
      .accent-light { fill: #E8EEF4; }
      
      .font-title { font-family: 'PingFang SC', 'Hiragino Sans', 'Noto Sans SC', sans-serif; font-weight: 600; }
      .font-body { font-family: 'PingFang SC', 'Hiragino Sans', 'Noto Sans SC', sans-serif; font-weight: 400; }
      .font-mono { font-family: 'SF Mono', 'Menlo', monospace; }
      
      .time-text { font-family: 'PingFang SC', 'Hiragino Sans', 'Noto Sans SC', sans-serif; font-size: 10px; fill: #9CA3AF; text-anchor: end; }
      .time-dot { fill: #E5E5E5; }
      .time-line { fill: none; stroke: #E5E5E5; stroke-width: 0.5; }
      
      .task-check { fill: none; stroke: #9CA3AF; stroke-width: 1.5; }
      .priority-high { fill: #5B7B9A; }
      .priority-med { fill: #9CA3AF; }
      
      .water-filled { fill: #E8EEF4; stroke: #5B7B9A; stroke-width: 1; }
      .water-empty { fill: #FAFAFA; stroke: #E5E5E5; stroke-width: 1; }
      
      .mood-dot { fill: #E5E5E5; }
      .mood-dot-active { fill: #5B7B9A; }
    </style>
