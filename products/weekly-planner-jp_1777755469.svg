      .bg { fill: #F5F0EB; }
      .surface { fill: #EDE6DC; }
      .fg { fill: #3D3A36; }
      .muted { fill: #A89F94; }
      .border-color { fill: #D5CDC2; }
      .accent { fill: #8B7355; }
      
      .border-stroke { stroke: #D5CDC2; stroke-width: 1.5; fill: none; }
      .border-stroke-thin { stroke: #D5CDC2; stroke-width: 0.5; fill: none; }
      .border-stroke-accent { stroke: #8B7355; stroke-width: 1; fill: none; }
      
