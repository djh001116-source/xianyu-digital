<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <style>
      .bg { fill: #F5F0EB; }
      .border { fill: none; stroke: #D5CDC2; stroke-width: 1.5; }
      .line-main { fill: none; stroke: #1A1A1A; stroke-linecap: round; stroke-linejoin: round; }
      .line-thin { fill: none; stroke: #1A1A1A; stroke-width: 0.7; stroke-linecap: round; }
      .line-med { fill: none; stroke: #1A1A1A; stroke-width: 1.5; stroke-linecap: round; }
      .line-thick { fill: none; stroke: #1A1A1A; stroke-width: 2.5; stroke-linecap: round; }
      .line-out { fill: none; stroke: #1A1A1A; stroke-width: 3; stroke-linecap: round; }
      .dot { fill: #1A1A1A; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="1000"/>

  <!-- Outer border frame -->
  <rect x="15" y="15" width="770" height="970" class="border"/>
  <rect x="20" y="20" width="760" height="960" class="border" stroke-width="0.5"/>

  <!-- Corner circles on outer frame -->
  <circle cx="15" cy="15" r="4" class="dot"/>
  <circle cx="785" cy="15" r="4" class="dot"/>
  <circle cx="15" cy="985" r="4" class="dot"/>
  <circle cx="785" cy="985" r="4" class="dot"/>

  <!-- Decorative border circles along top edge -->
  <circle cx="80" cy="15" r="2.5" class="dot"/>
  <circle cx="145" cy="15" r="2.5" class="dot"/>
  <circle cx="210" cy="15" r="2.5" class="dot"/>
  <circle cx="275" cy="15" r="2.5" class="dot"/>
  <circle cx="340" cy="15" r="2.5" class="dot"/>
  <circle cx="405" cy="15" r="2.5" class="dot"/>
  <circle cx="470" cy="15" r="2.5" class="dot"/>
  <circle cx="535" cy="15" r="2.5" class="dot"/>
  <circle cx="600" cy="15" r="2.5" class="dot"/>
  <circle cx="665" cy="15" r="2.5" class="dot"/>
  <circle cx="730" cy="15" r="2.5" class="dot"/>

  <!-- Decorative border circles along bottom edge -->
  <circle cx="80" cy="985" r="2.5" class="dot"/>
  <circle cx="145" cy="985" r="2.5" class="dot"/>
  <circle cx="210" cy="985" r="2.5" class="dot"/>
  <circle cx="275" cy="985" r="2.5" class="dot"/>
  <circle cx="340" cy="985" r="2.5" class="dot"/>
  <circle cx="405" cy="985" r="2.5" class="dot"/>
  <circle cx="470" cy="985" r="2.5" class="dot"/>
  <circle cx="535" cy="985" r="2.5" class="dot"/>
  <circle cx="600" cy="985" r="2.5" class="dot"/>
  <circle cx="665" cy="985" r="2.5" class="dot"/>
  <circle cx="730" cy="985" r="2.5" class="dot"/>

  <!-- Decorative border circles along left edge -->
  <circle cx="15" cy="80" r="2.5" class="dot"/>
  <circle cx="15" cy="145" r="2.5" class="dot"/>
  <circle cx="15" cy="210" r="2.5" class="dot"/>
  <circle cx="15" cy="275" r="2.5" class="dot"/>
  <circle cx="15" cy="340" r="2.5" class="dot"/>
  <circle cx="15" cy="405" r="2.5" class="dot"/>
  <circle cx="15" cy="470" r="2.5" class="dot"/>
  <circle cx="15" cy="535" r="2.5" class="dot"/>
  <circle cx="15" cy="600" r="2.5" class="dot"/>
  <circle cx="15" cy="665" r="2.5" class="dot"/>
  <circle cx="15" cy="730" r="2.5" class="dot"/>
  <circle cx="15" cy="795" r="2.5" class="dot"/>
  <circle cx="15" cy="860" r="2.5" class="dot"/>
  <circle cx="15" cy="925" r="2.5" class="dot"/>

  <!-- Decorative border circles along right edge -->
  <circle cx="785" cy="80" r="2.5" class="dot"/>
  <circle cx="785" cy="145" r="2.5" class="dot"/>
  <circle cx="785" cy="210" r="2.5" class="dot"/>
  <circle cx="785" cy="275" r="2.5" class="dot"/>
  <circle cx="785" cy="340" r="2.5" class="dot"/>
  <circle cx="785" cy="405" r="2.5" class="dot"/>
  <circle cx="785" cy="470" r="2.5" class="dot"/>
  <circle cx="785" cy="535" r="2.5" class="dot"/>
  <circle cx="785" cy="600" r="2.5" class="dot"/>
  <circle cx="785" cy="665" r="2.5" class="dot"/>
  <circle cx="785" cy="730" r="2.5" class="dot"/>
  <circle cx="785" cy="795" r="2.5" class="dot"/>
  <circle cx="785" cy="860" r="2.5" class="dot"/>
  <circle cx="785" cy="925" r="2.5" class="dot"/>

  <!-- Center of mandala: 400, 480 -->
  <!-- Layer 0: Center small flower -->
  <g transform="translate(400, 480)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" class="dot"/>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="10" class="line-thin"/>

    <!-- Small petals around center -->
    <g class="line-thin">
      <ellipse cx="0" cy="-14" rx="4" ry="8"/>
      <ellipse cx="12" cy="-7" rx="4" ry="8" transform="rotate(30)"/>
      <ellipse cx="12" cy="7" rx="4" ry="8" transform="rotate(60)"/>
      <ellipse cx="0" cy="14" rx="4" ry="8" transform="rotate(90)"/>
      <ellipse cx="-12" cy="7" rx="4" ry="8" transform="rotate(120)"/>
      <ellipse cx="-12" cy="-7" rx="4" ry="8" transform="rotate(150)"/>
    </g>

    <!-- Ring 1: 12-petal flower R=28 -->
    <circle cx="0" cy="0" r="28" class="line-med"/>

    <!-- Petals on ring 1 -->
    <g class="line-thin">
      <path d="M0,-28 Q8,-20 0,-14 Q-8,-20 0,-28Z"/>
      <path d="M14,-24 Q18,-14 12,-7 Q6,-14 14,-24Z" transform="rotate(30)"/>
      <path d="M24,-14 Q20,-6 12,0 Q6,-6 24,-14Z" transform="rotate(60)"/>
      <path d="M28,0 Q20,8 14,0 Q20,-8 28,0Z" transform="rotate(90)"/>
      <path d="M24,14 Q14,18 7,12 Q14,6 24,14Z" transform="rotate(120)"/>
      <path d="M14,24 Q6,20 0,12 Q-6,20 14,24Z" transform="rotate(150)"/>
      <path d="M0,28 Q-8,20 0,14 Q8,20 0,28Z" transform="rotate(180)"/>
      <path d="M-14,24 Q-18,14 -12,7 Q-6,14 -14,24Z" transform="rotate(210)"/>
      <path d="M-24,14 Q-20,6 -12,0 Q-6,6 -24,14Z" transform="rotate(240)"/>
      <path d="M-28,0 Q-20,-8 -14,0 Q-20,8 -28,0Z" transform="rotate(270)"/>
      <path d="M-24,-14 Q-14,-18 -7,-12 Q-14,-6 -24,-14Z" transform="rotate(300)"/>
      <path d="M-14,-24 Q-6,-20 0,-12 Q6,-20 -14,-24Z" transform="rotate(330)"/>
    </g>

    <!-- Ring 2: Scalloped wave pattern R=48 -->
    <circle cx="0" cy="0" r="48" class="line-med"/>

    <!-- Wave pattern between R=48 and R=58 -->
    <g class="line-thin">
      <path d="M0,-48 Q10,-55 0,-58 Q-10,-55 0,-48Z"/>
      <path d="M24,-41.6 Q30,-47.5 29,-51 Q26,-48 24,-41.6Z" transform="rotate(30)"/>
      <path d="M41.6,-24 Q47.5,-30 51,-29 Q48,-26 41.6,-24Z" transform="rotate(60)"/>
      <path d="M48,0 Q55,-10 58,0 Q55,10 48,0Z" transform="rotate(90)"/>
      <path d="M41.6,24 Q47.5,30 51,29 Q48,26 41.6,24Z" transform="rotate(120)"/>
      <path d="M24,41.6 Q30,47.5 29,51 Q26,48 24,41.6Z" transform="rotate(150)"/>
      <path d="M0,48 Q-10,55 0,58 Q10,55 0,48Z" transform="rotate(180)"/>
      <path d="M-24,41.6 Q-30,47.5 -29,51 Q-26,48 -24,41.6Z" transform="rotate(210)"/>
      <path d="M-41.6,24 Q-47.5,30 -51,29 Q-48,26 -41.6,24Z" transform="rotate(240)"/>
      <path d="M-48,0 Q-55,-10 -58,0 Q-55,10 -48,0Z" transform="rotate(270)"/>
      <path d="M-41.6,-24 Q-47.5,-30 -51,-29 Q-48,-26 -41.6,-24Z" transform="rotate(300)"/>
      <path d="M-24,-41.6 Q-30,-47.5 -29,-51 Q-26,-48 -24,-41.6Z" transform="rotate(330)"/>
    </g>

    <!-- Ring 3: Diamond/zigzag pattern R=72 -->
    <circle cx="0" cy="0" r="72" class="line-med"/>

    <!-- Diamond segments -->
    <g class="line-thin">
      <path d="M0,-72 L10,-60 L0,-52 L-10,-60 Z"/>
      <path d="M36,-62.4 L44,-50 L38,-40 L30,-50 Z" transform="rotate(30)"/>
      <path d="M62.4,-36 L60,-22 L52,-18 L50,-30 Z" transform="rotate(60)"/>
      <path d="M72,0 L66,12 L56,14 L58,2 Z" transform="rotate(90)"/>
      <path d="M62.4,36 L56,44 L46,42 L50,32 Z" transform="rotate(120)"/>
      <path d="M36,62.4 L30,56 L22,54 L28,44 Z" transform="rotate(150)"/>
      <path d="M0,72 L-10,60 L0,52 L10,60 Z" transform="rotate(180)"/>
      <path d="M-36,62.4 L-44,50 L-38,40 L-30,50 Z" transform="rotate(210)"/>
      <path d="M-62.4,36 L-60,22 L-52,18 L-50,30 Z" transform="rotate(240)"/>
      <path d="M-72,0 L-66,-12 L-56,-14 L-58,-2 Z" transform="rotate(270)"/>
      <path d="M-62.4,-36 L-56,-44 L-46,-42 L-50,-32 Z" transform="rotate(300)"/>
      <path d="M-36,-62.4 L-30,-56 L-22,-54 L-28,-44 Z" transform="rotate(330)"/>
    </g>

    <!-- Ring 4: Scallop border R=95 -->
    <circle cx="0" cy="0" r="95" class="line-thick"/>

    <!-- Outer scallop decoration -->
    <g class="line-med">
      <circle cx="0" cy="-95" r="6" fill="none"/>
      <circle cx="47.5" cy="-82.3" r="6" fill="none"/>
      <circle cx="82.3" cy="-47.5" r="6" fill="none"/>
      <circle cx="95" cy="0" r="6" fill="none"/>
      <circle cx="82.3" cy="47.5" r="6" fill="none"/>
      <circle cx="47.5" cy="82.3" r="6" fill="none"/>
      <circle cx="0" cy="95" r="6" fill="none"/>
      <circle cx="-47.5" cy="82.3" r="6" fill="none"/>
      <circle cx="-82.3" cy="47.5" r="6" fill="none"/>
      <circle cx="-95" cy="0" r="6" fill="none"/>
      <circle cx="-82.3" cy="-47.5" r="6" fill="none"/>
      <circle cx="-47.5" cy="-82.3" r="6" fill="none"/>
    </g>

    <!-- Connecting arcs between scallop circles -->
    <g class="line-thin">
      <path d="M0,-95 Q24,-100 47.5,-82.3" fill="none"/>
      <path d="M47.5,-82.3 Q70,-70 82.3,-47.5" fill="none"/>
      <path d="M82.3,-47.5 Q95,-24 95,0" fill="none"/>
      <path d="M95,0 Q95,24 82.3,47.5" fill="none"/>
      <path d="M82.3,47.5 Q70,70 47.5,82.3" fill="none"/>
      <path d="M47.5,82.3 Q24,95 0,95" fill="none"/>
      <path d="M0,95 Q-24,95 -47.5,82.3" fill="none"/>
      <path d="M-47.5,82.3 Q-70,70 -82.3,47.5" fill="none"/>
      <path d="M-82.3,47.5 Q-95,24 -95,0" fill="none"/>
      <path d="M-95,0 Q-95,-24 -82.3,-47.5" fill="none"/>
      <path d="M-82.3,-47.5 Q-70,-70 -47.5,-82.3" fill="none"/>
      <path d="M-47.5,-82.3 Q-24,-100 0,-95" fill="none"/>
    </g>

    <!-- Outer decorative ring R=110 -->
    <circle cx="0" cy="0" r="110" class="line-out"/>

    <!-- Decorative dots on outer ring -->
    <g class="dot">
      <circle cx="0" cy="-110" r="3"/>
      <circle cx="55" cy="-95.3" r="3"/>
      <circle cx="95.3" cy="-55" r="3"/>
      <circle cx="110" cy="0" r="3"/>
      <circle cx="95.3" cy="55" r="3"/>
      <circle cx="55" cy="95.3" r="3"/>
      <circle cx="0" cy="110" r="3"/>
      <circle cx="-55" cy="95.3" r="3"/>
      <circle cx="-95.3" cy="55" r="3"/>
      <circle cx="-110" cy="0" r="3"/>
      <circle cx="-95.3" cy="-55" r="3"/>
      <circle cx="-55" cy="-95.3" r="3"/>
    </g>

    <!-- Fine detail lines between rings -->
    <!-- Spokes from center to ring 1 -->
    <g class="line-thin">
      <line x1="0" y1="-10" x2="0" y2="-28"/>
      <line x1="8.7" y1="-5" x2="24" y2="-14" transform="rotate(30)"/>
      <line x1="8.7" y1="5" x2="24" y2="14" transform="rotate(60)"/>
      <line x1="0" y1="10" x2="0" y2="28" transform="rotate(90)"/>
      <line x1="-8.7" y1="5" x2="-24" y2="14" transform="rotate(120)"/>
      <line x1="-8.7" y1="-5" x2="-24" y2="-14" transform="rotate(150)"/>
    </g>

    <!-- Small diamond accents between ring 1 and ring 2 -->
    <g class="line-thin">
      <path d="M0,-30 L3,-38 L0,-48 L-3,-38 Z"/>
      <path d="M15,-26 L20,-33 L24,-41.6 L18,-35 Z" transform="rotate(30)"/>
      <path d="M26,-15 L34,-20 L41.6,-24 L35,-18 Z" transform="rotate(60)"/>
      <path d="M30,0 L38,-3 L48,0 L38,3 Z" transform="rotate(90)"/>
      <path d="M26,15 L34,20 L41.6,24 L35,18 Z" transform="rotate(120)"/>
      <path d="M15,26 L20,33 L24,41.6 L18,35 Z" transform="rotate(150)"/>
      <path d="M0,30 L-3,38 L0,48 L3,38 Z" transform="rotate(180)"/>
      <path d="M-15,26 L-20,33 L-24,41.6 L-18,35 Z" transform="rotate(210)"/>
      <path d="M-26,15 L-34,20 L-41.6,24 L-35,18 Z" transform="rotate(240)"/>
      <path d="M-30,0 L-38,-3 L-48,0 L-38,3 Z" transform="rotate(270)"/>
      <path d="M-26,-15 L-34,-20 L-41.6,-24 L-35,-18 Z" transform="rotate(300)"/>
      <path d="M-15,-26 L-20,-33 L-24,-41.6 L-18,-35 Z" transform="rotate(330)"/>
    </g>

    <!-- Tiny dots between ring 2 and ring 3 -->
    <g class="dot">
      <circle cx="0" cy="-65" r="1.5"/>
      <circle cx="32.5" cy="-56.3" r="1.5"/>
      <circle cx="56.3" cy="-32.5" r="1.5"/>
      <circle cx="65" cy="0" r="1.5"/>
      <circle cx="56.3" cy="32.5" r="1.5"/>
      <circle cx="32.5" cy="56.3" r="1.5"/>
      <circle cx="0" cy="65" r="1.5"/>
      <circle cx="-32.5" cy="56.3" r="1.5"/>
      <circle cx="-56.3" cy="32.5" r="1.5"/>
      <circle cx="-65" cy="0" r="1.5"/>
      <circle cx="-56.3" cy="-32.5" r="1.5"/>
      <circle cx="-32.5" cy="-56.3" r="1.5"/>
    </g>

    <!-- Triangle accents between ring 3 and ring 4 -->
    <g class="line-thin">
      <path d="M0,-76 L5,-85 L-5,-85 Z"/>
      <path d="M38,-65.8 L44,-73 L32,-74 Z" transform="rotate(30)"/>
      <path d="M65.8,-38 L73,-44 L74,-32 Z" transform="rotate(60)"/>
      <path d="M76,0 L85,-5 L85,5 Z" transform="rotate(90)"/>
      <path d="M65.8,38 L73,44 L74,32 Z" transform="rotate(120)"/>
      <path d="M38,65.8 L44,73 L32,74 Z" transform="rotate(150)"/>
      <path d="M0,76 L-5,85 L5,85 Z" transform="rotate(180)"/>
      <path d="M-38,65.8 L-44,73 L-32,74 Z" transform="rotate(210)"/>
      <path d="M-65.8,38 L-73,44 L-74,32 Z" transform="rotate(240)"/>
      <path d="M-76,0 L-85,-5 L-85,5 Z" transform="rotate(270)"/>
      <path d="M-65.8,-38 L-73,-44 L-74,-32 Z" transform="rotate(300)"/>
      <path d="M-38,-65.8 L-44,-73 L-32,-74 Z" transform="rotate(330)"/>
    </g>

    <!-- Extra fine concentric circles for detail -->
    <circle cx="0" cy="0" r="6" class="line-thin"/>
    <circle cx="0" cy="0" r="18" class="line-thin" stroke-dasharray="2,3"/>
    <circle cx="0" cy="0" r="38" class="line-thin" stroke-dasharray="1,4"/>
    <circle cx="0" cy="0" r="60" class="line-thin" stroke-dasharray="3,2"/>
    <circle cx="0" cy="0" r="84" class="line-thin" stroke-dasharray="1,3"/>
    <circle cx="0" cy="0" r="100" class="line-thin" stroke-dasharray="2,5"/>
  </g>
</svg>