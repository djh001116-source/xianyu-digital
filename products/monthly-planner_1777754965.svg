<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .bg { fill: #FAFAF8; }
      .border { fill: none; stroke: #D0D0C8; stroke-width: 2; }
      .title-main { 
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        font-size: 28px;
        font-weight: 700;
        fill: #3A3A3A;
        letter-spacing: 4px;
      }
      .title-sub {
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        font-size: 11px;
        font-weight: 300;
        fill: #A0A098;
        letter-spacing: 2px;
      }
      .section-title {
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        font-size: 13px;
        font-weight: 600;
        fill: #4A4A4A;
        letter-spacing: 1.5px;
      }
      .section-sub {
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        font-size: 8px;
        font-weight: 300;
        fill: #B0B0A8;
        letter-spacing: 1px;
      }
      .day-num {
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        font-size: 11px;
        font-weight: 400;
        fill: #6A6A62;
      }
      .day-name {
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        font-size: 8px;
        font-weight: 300;
        fill: #B0B0A8;
      }
      .grid-cell { fill: none; stroke: #E8E8E0; stroke-width: 0.8; }
      .grid-cell-light { fill: none; stroke: #F0F0EA; stroke-width: 0.5; }
      .accent-line { fill: none; stroke: #C8C8BE; stroke-width: 0.8; }
      .dot { fill: #D8D8D0; }
      .text-light {
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        font-size: 9px;
        font-weight: 300;
        fill: #C0C0B8;
      }
      .note-text {
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        font-size: 10px;
        font-weight: 300;
        fill: #8A8A82;
      }
      .month-title {
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        font-size: 16px;
        font-weight: 500;
        fill: #4A4A42;
        letter-spacing: 3px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="1000" rx="4" ry="4"/>

  <!-- Outer border -->
  <rect class="border" x="20" y="20" width="760" height="960" rx="4" ry="4"/>

  <!-- Inner subtle border -->
  <rect fill="none" stroke="#E8E8E0" stroke-width="0.5" x="30" y="30" width="740" height="940" rx="2" ry="2"/>

  <!-- Top decorative line -->
  <line class="accent-line" x1="40" y1="68" x2="760" y2="68"/>

  <!-- Title Section -->
  <text class="title-main" x="400" y="52" text-anchor="middle">MONTHLY PLANNER</text>
  <text class="title-sub" x="400" y="64" text-anchor="middle">2026 · 月计划表</text>

  <!-- Month selector area -->
  <text class="month-title" x="50" y="110">一月</text>
  <text class="section-sub" x="50" y="120">JANUARY</text>

  <!-- Decorative dots next to month -->
  <circle class="dot" cx="160" cy="107" r="2.5"/>
  <circle class="dot" cx="172" cy="107" r="2.5"/>
  <circle class="dot" cx="184" cy="107" r="2.5"/>

  <!-- Day headers -->
  <text class="day-name" x="55" y="148">日</text>
  <text class="day-name" x="155" y="148">一</text>
  <text class="day-name" x="255" y="148">二</text>
  <text class="day-name" x="355" y="148">三</text>
  <text class="day-name" x="455" y="148">四</text>
  <text class="day-name" x="555" y="148">五</text>
  <text class="day-name" x="655" y="148">六</text>

  <!-- Separator line under day headers -->
  <line class="accent-line" x1="50" y1="155" x2="750" y2="155"/>

  <!-- Calendar Grid: 7 columns x 5 rows = 35 cells (we'll use 31) -->
  <!-- Each cell: 100px wide, 72px tall -->
  <!-- Row 1 (days 1-7) -->
  <rect class="grid-cell" x="50" y="158" width="100" height="72"/>
  <rect class="grid-cell" x="150" y="158" width="100" height="72"/>
  <rect class="grid-cell" x="250" y="158" width="100" height="72"/>
  <rect class="grid-cell" x="350" y="158" width="100" height="72"/>
  <rect class="grid-cell" x="450" y="158" width="100" height="72"/>
  <rect class="grid-cell" x="550" y="158" width="100" height="72"/>
  <rect class="grid-cell" x="650" y="158" width="100" height="72"/>

  <!-- Row 2 (days 8-14) -->
  <rect class="grid-cell" x="50" y="230" width="100" height="72"/>
  <rect class="grid-cell" x="150" y="230" width="100" height="72"/>
  <rect class="grid-cell" x="250" y="230" width="100" height="72"/>
  <rect class="grid-cell" x="350" y="230" width="100" height="72"/>
  <rect class="grid-cell" x="450" y="230" width="100" height="72"/>
  <rect class="grid-cell" x="550" y="230" width="100" height="72"/>
  <rect class="grid-cell" x="650" y="230" width="100" height="72"/>

  <!-- Row 3 (days 15-21) -->
  <rect class="grid-cell" x="50" y="302" width="100" height="72"/>
  <rect class="grid-cell" x="150" y="302" width="100" height="72"/>
  <rect class="grid-cell" x="250" y="302" width="100" height="72"/>
  <rect class="grid-cell" x="350" y="302" width="100" height="72"/>
  <rect class="grid-cell" x="450" y="302" width="100" height="72"/>
  <rect class="grid-cell" x="550" y="302" width="100" height="72"/>
  <rect class="grid-cell" x="650" y="302" width="100" height="72"/>

  <!-- Row 4 (days 22-28) -->
  <rect class="grid-cell" x="50" y="374" width="100" height="72"/>
  <rect class="grid-cell" x="150" y="374" width="100" height="72"/>
  <rect class="grid-cell" x="250" y="374" width="100" height="72"/>
  <rect class="grid-cell" x="350" y="374" width="100" height="72"/>
  <rect class="grid-cell" x="450" y="374" width="100" height="72"/>
  <rect class="grid-cell" x="550" y="374" width="100" height="72"/>
  <rect class="grid-cell" x="650" y="374" width="100" height="72"/>

  <!-- Row 5 (days 29-31) -->
  <rect class="grid-cell" x="50" y="446" width="100" height="72"/>
  <rect class="grid-cell" x="150" y="446" width="100" height="72"/>
  <rect class="grid-cell" x="250" y="446" width="100" height="72"/>
  <rect class="grid-cell" x="350" y="446" width="100" height="72"/>
  <rect class="grid-cell" x="450" y="446" width="100" height="72"/>
  <rect class="grid-cell" x="550" y="446" width="100" height="72"/>
  <rect class="grid-cell" x="650" y="446" width="100" height="72"/>

  <!-- Day numbers -->
  <!-- Row 1: days 1-7 -->
  <text class="day-num" x="62" y="176">1</text>
  <text class="day-num" x="162" y="176">2</text>
  <text class="day-num" x="262" y="176">3</text>
  <text class="day-num" x="362" y="176">4</text>
  <text class="day-num" x="462" y="176">5</text>
  <text class="day-num" x="562" y="176">6</text>
  <text class="day-num" x="662" y="176">7</text>

  <!-- Row 2: days 8-14 -->
  <text class="day-num" x="62" y="248">8</text>
  <text class="day-num" x="162" y="248">9</text>
  <text class="day-num" x="262" y="248">10</text>
  <text class="day-num" x="362" y="248">11</text>
  <text class="day-num" x="462" y="248">12</text>
  <text class="day-num" x="562" y="248">13</text>
  <text class="day-num" x="662" y="248">14</text>

  <!-- Row 3: days 15-21 -->
  <text class="day-num" x="62" y="320">15</text>
  <text class="day-num" x="162" y="320">16</text>
  <text class="day-num" x="262" y="320">17</text>
  <text class="day-num" x="362" y="320">18</text>
  <text class="day-num" x="462" y="320">19</text>
  <text class="day-num" x="562" y="320">20</text>
  <text class="day-num" x="662" y="320">21</text>

  <!-- Row 4: days 22-28 -->
  <text class="day-num" x="62" y="392">22</text>
  <text class="day-num" x="162" y="392">23</text>
  <text class="day-num" x="262" y="392">24</text>
  <text class="day-num" x="362" y="392">25</text>
  <text class="day-num" x="462" y="392">26</text>
  <text class="day-num" x="562" y="392">27</text>
  <text class="day-num" x="662" y="392">28</text>

  <!-- Row 5: days 29-31 -->
  <text class="day-num" x="62" y="464">29</text>
  <text class="day-num" x="162" y="464">30</text>
  <text class="day-num" x="262" y="464">31</text>

  <!-- Bottom section divider -->
  <line class="accent-line" x1="50" y1="548" x2="750" y2="548"/>

  <!-- ===== BOTTOM SECTIONS ===== -->

  <!-- MONTH GOALS -->
  <text class="section-title" x="50" y="580">本月目标</text>
  <text class="section-sub" x="50" y="592">MONTH GOALS</text>

  <!-- Goal lines -->
  <line class="accent-line" x1="50" y1="608" x2="370" y2="608"/>
  <line class="accent-line" x1="50" y1="628" x2="370" y2="628"/>
  <line class="accent-line" x1="50" y1="648" x2="370" y2="648"/>

  <!-- Goal dots -->
  <circle cx="55" cy="605" r="2" fill="#C8C8BE"/>
  <circle cx="55" cy="625" r="2" fill="#C8C8BE"/>
  <circle cx="55" cy="645" r="2" fill="#C8C8BE"/>

  <!-- TOP 3 PRIORITIES -->
  <text class="section-title" x="430" y="580">重点事项</text>
  <text class="section-sub" x="430" y="592">TOP 3 PRIORITIES</text>

  <!-- Priority lines -->
  <line class="accent-line" x1="430" y1="608" x2="750" y2="608"/>
  <line class="accent-line" x1="430" y1="628" x2="750" y2="628"/>
  <line class="accent-line" x1="430" y1="648" x2="750" y2="648"/>

  <!-- Priority numbers -->
  <text class="day-num" x="435" y="605">1</text>
  <text class="day-num" x="435" y="625">2</text>
  <text class="day-num" x="435" y="645">3</text>

  <!-- Divider between priorities and notes -->
  <line class="accent-line" x1="50" y1="670" x2="750" y2="670"/>

  <!-- NOTES section -->
  <text class="section-title" x="50" y="700">笔记</text>
  <text class="section-sub" x="50" y="712">NOTES</text>

  <!-- Notes area - lined paper style -->
  <line class="grid-cell-light" x1="50" y1="730" x2="750" y2="730"/>
  <line class="grid-cell-light" x1="50" y1="750" x2="750" y2="750"/>
  <line class="grid-cell-light" x1="50" y1="770" x2="750" y2="770"/>
  <line class="grid-cell-light" x1="50" y1="790" x2="750" y2="790"/>
  <line class="grid-cell-light" x1="50" y1="810" x2="750" y2="810"/>
  <line class="grid-cell-light" x1="50" y1="830" x2="750" y2="830"/>
  <line class="grid-cell-light" x1="50" y1="850" x2="750" y2="850"/>
  <line class="grid-cell-light" x1="50" y1="870" x2="750" y2="870"/>
  <line class="grid-cell-light" x1="50" y1="890" x2="750" y2="890"/>
  <line class="grid-cell-light" x1="50" y1="910" x2="750" y2="910"/>

  <!-- Vertical margin line for notes -->
  <line class="accent-line" x1="65" y1="720" x2="65" y2="920"/>

  <!-- Bottom decorative elements -->
  <line class="accent-line" x1="50" y1="935" x2="750" y2="935"/>

  <!-- Small decorative dots at bottom -->
  <circle cx="380" cy="948" r="2" fill="#D8D8D0"/>
  <circle cx="392" cy="948" r="2" fill="#D8D8D0"/>
  <circle cx="404" cy="948" r="2" fill="#D8D8D0"/>
  <circle cx="416" cy="948" r="2" fill="#D8D8D0"/>
  <circle cx="428" cy="948" r="2" fill="#D8D8D0"/>

  <!-- Footer text -->
  <text class="text-light" x="400" y="960" text-anchor="middle">© 2026 MONTHLY PLANNER · 月计划表</text>
</svg>