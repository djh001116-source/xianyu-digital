<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
      * { font-family: 'PingFang SC', 'Hiragino Sans', 'Noto Sans SC', sans-serif; }
      .bg { fill: #FAFAFA; }
      .border { fill: none; stroke: #E5E5E5; stroke-width: 1.5; }
      .surface { fill: #F0F0F0; }
      .text-main { fill: #2D2D2D; }
      .text-muted { fill: #9CA3AF; }
      .text-accent { fill: #5B7B9A; }
      .accent-fill { fill: #5B7B9A; }
      .accent-stroke { stroke: #5B7B9A; }
      .grid-line { stroke: #E5E5E5; stroke-width: 0.5; }
      .thin-line { stroke: #E5E5E5; stroke-width: 1; }
      .title { font-size: 22px; font-weight: 700; letter-spacing: 3px; fill: #2D2D2D; }
      .subtitle { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; fill: #9CA3AF; }
      .day-label { font-size: 9px; font-weight: 600; fill: #2D2D2D; }
      .time-label { font-size: 7px; font-weight: 500; fill: #9CA3AF; text-anchor: end; }
      .section-title { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; fill: #2D2D2D; }
      .task-number { font-size: 10px; font-weight: 700; fill: #5B7B9A; }
      .task-text { font-size: 9px; fill: #2D2D2D; }
      .progress-label { font-size: 8px; fill: #9CA3AF; }
      .progress-value { font-size: 18px; font-weight: 700; fill: #5B7B9A; }
      .note-line { stroke: #E5E5E5; stroke-width: 0.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="1000"/>

  <!-- Outer border -->
  <rect class="border" x="15" y="15" width="770" height="970" rx="0"/>

  <!-- Header section -->
  <text x="40" y="55" class="title">STUDY SCHEDULE</text>
  <text x="40" y="72" class="subtitle">学习计划表 · WEEK 01</text>
  <line x1="40" y1="82" x2="760" y2="82" class="thin-line"/>

  <!-- ===== TIME GRID ===== -->
  <!-- Grid background -->
  <rect x="40" y="100" width="720" height="380" class="surface" rx="2"/>

  <!-- Column headers (days) -->
  <text x="80" y="118" class="day-label">周一</text>
  <text x="180" y="118" class="day-label">周二</text>
  <text x="280" y="118" class="day-label">周三</text>
  <text x="380" y="118" class="day-label">周四</text>
  <text x="480" y="118" class="day-label">周五</text>
  <text x="580" y="118" class="day-label">周六</text>
  <text x="680" y="118" class="day-label">周日</text>

  <!-- Vertical grid lines (day columns) -->
  <line x1="130" y1="125" x2="130" y2="475" class="grid-line"/>
  <line x1="230" y1="125" x2="230" y2="475" class="grid-line"/>
  <line x1="330" y1="125" x2="330" y2="475" class="grid-line"/>
  <line x1="430" y1="125" x2="430" y2="475" class="grid-line"/>
  <line x1="530" y1="125" x2="530" y2="475" class="grid-line"/>
  <line x1="630" y1="125" x2="630" y2="475" class="grid-line"/>
  <line x1="730" y1="125" x2="730" y2="475" class="grid-line"/>

  <!-- Horizontal grid lines (time rows) -->
  <line x1="40" y1="160" x2="760" y2="160" class="grid-line"/>
  <line x1="40" y1="200" x2="760" y2="200" class="grid-line"/>
  <line x1="40" y1="240" x2="760" y2="240" class="grid-line"/>
  <line x1="40" y1="280" x2="760" y2="280" class="grid-line"/>
  <line x1="40" y1="320" x2="760" y2="320" class="grid-line"/>
  <line x1="40" y1="360" x2="760" y2="360" class="grid-line"/>
  <line x1="40" y1="400" x2="760" y2="400" class="grid-line"/>
  <line x1="40" y1="440" x2="760" y2="440" class="grid-line"/>

  <!-- Time labels (left side) -->
  <text x="35" y="145" class="time-label">7AM</text>
  <text x="35" y="185" class="time-label">8AM</text>
  <text x="35" y="225" class="time-label">9AM</text>
  <text x="35" y="265" class="time-label">10AM</text>
  <text x="35" y="305" class="time-label">11AM</text>
  <text x="35" y="345" class="time-label">12PM</text>
  <text x="35" y="385" class="time-label">1PM</text>
  <text x="35" y="425" class="time-label">2PM</text>
  <text x="35" y="465" class="time-label">3PM</text>

  <!-- Sample content in grid cells -->
  <text x="50" y="175" class="task-text" font-size="7">英语</text>
  <text x="50" y="210" class="task-text" font-size="7">数学</text>
  <text x="150" y="175" class="task-text" font-size="7">物理</text>
  <text x="150" y="210" class="task-text" font-size="7">化学</text>
  <text x="250" y="175" class="task-text" font-size="7">语文</text>
  <text x="350" y="175" class="task-text" font-size="7">生物</text>
  <text x="350" y="210" class="task-text" font-size="7">历史</text>
  <text x="450" y="175" class="task-text" font-size="7">地理</text>
  <text x="550" y="175" class="task-text" font-size="7">政治</text>
  <text x="650" y="175" class="task-text" font-size="7">复习</text>
  <text x="650" y="210" class="task-text" font-size="7">预习</text>

  <!-- ===== PRIORITY TASKS SECTION ===== -->
  <text x="40" y="520" class="section-title">PRIORITY TASKS · 优先任务</text>
  <line x1="40" y1="528" x2="200" y2="528" class="thin-line"/>

  <!-- Task 1 -->
  <rect x="40" y="540" width="16" height="16" class="accent-fill" rx="1"/>
  <text x="44" y="552" class="task-number" fill="#FAFAFA">1</text>
  <text x="65" y="552" class="task-text" font-size="10">完成数学第三章复习题</text>
  <line x1="40" y1="565" x2="380" y2="565" class="note-line"/>

  <!-- Task 2 -->
  <rect x="40" y="580" width="16" height="16" class="accent-fill" rx="1"/>
  <text x="44" y="592" class="task-number" fill="#FAFAFA">2</text>
  <text x="65" y="592" class="task-text" font-size="10">英语单词List 5-8 默写</text>
  <line x1="40" y1="605" x2="380" y2="605" class="note-line"/>

  <!-- Task 3 -->
  <rect x="40" y="620" width="16" height="16" class="accent-fill" rx="1"/>
  <text x="44" y="632" class="task-number" fill="#FAFAFA">3</text>
  <text x="65" y="632" class="task-text" font-size="10">物理实验报告整理</text>
  <line x1="40" y1="645" x2="380" y2="645" class="note-line"/>

  <!-- ===== PROGRESS TRACKING ===== -->
  <text x="540" y="520" class="section-title">PROGRESS · 今日完成度</text>
  <line x1="540" y1="528" x2="700" y2="528" class="thin-line"/>

  <!-- Semi-circle progress ring -->
  <circle cx="620" cy="600" r="45" fill="none" stroke="#E5E5E5" stroke-width="6"/>
  <!-- Progress arc (65%) - using path for semi-circle -->
  <path d="M 575 600 A 45 45 0 0 1 665 600" fill="none" class="accent-stroke" stroke-width="6"/>
  <!-- Progress arc second half (for >50%) -->
  <path d="M 575 600 A 45 45 0 0 1 585 560" fill="none" class="accent-stroke" stroke-width="6" opacity="0.3"/>

  <!-- Progress percentage -->
  <text x="620" y="595" text-anchor="middle" class="progress-value">65%</text>
  <text x="620" y="610" text-anchor="middle" class="progress-label">已完成</text>

  <!-- ===== REVISION NOTES ===== -->
  <text x="40" y="700" class="section-title">REVISION NOTES · 复习笔记</text>
  <line x1="40" y1="708" x2="180" y2="708" class="thin-line"/>

  <!-- Note lines -->
  <line x1="40" y1="730" x2="760" y2="730" class="note-line"/>
  <line x1="40" y1="765" x2="760" y2="765" class="note-line"/>
  <line x1="40" y1="800" x2="760" y2="800" class="note-line"/>
  <line x1="40" y1="835" x2="760" y2="835" class="note-line"/>

  <!-- Footer -->
  <line x1="40" y1="870" x2="760" y2="870" class="thin-line"/>
  <text x="40" y="890" class="subtitle" font-size="7">© 2024 STUDY SCHEDULE · 学习计划表</text>
  <text x="760" y="890" class="subtitle" font-size="7" text-anchor="end">PAGE 01</text>
</svg>