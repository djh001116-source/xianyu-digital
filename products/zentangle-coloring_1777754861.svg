  </defs>

  <!-- White background -->
  <rect width="800" height="1000" fill="#ffffff"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="760" height="960" fill="none" stroke="#1a1a1a" stroke-width="2.5" rx="4"/>

  <!-- Inner border frame -->
  <rect x="30" y="30" width="740" height="940" fill="none" stroke="#1a1a1a" stroke-width="0.8" rx="2"/>

  <!-- Title area divider line -->
  <line x1="60" y1="80" x2="740" y2="80" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Titles -->
  <text x="400" y="58" class="title-main">曼陀罗禅绕画</text>
  <text x="400" y="73" class="title-sub">MANDALA ZENTANGLE COLORING PAGE</text>

  <!-- Footer divider line -->
