<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <style>
      text {
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
        fill: #1a1a1a;
      }
      .title-main {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 6px;
        text-anchor: middle;
      }
      .title-sub {
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 4px;
        text-anchor: middle;
        fill: #555;
      }
      .footer-text {
        font-size: 10px;
        letter-spacing: 2px;
        text-anchor: middle;
        fill: #888;
      }
      .mandala-line {
        fill: none;
        stroke: #1a1a1a;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .mandala-fill {
        fill: #1a1a1a;
      }
